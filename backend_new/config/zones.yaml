cameras:
  CAM-03:
    zone_name: "Meeting Room 2"
    zone_type: "UNRESTRICTED"
    allowed_days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
    allowed_time: ["00:00","23:59"]
    allowed_occupancy: 8
    min_presence_seconds: 0
    person_conf_threshold: 0.25
    roi:
      polygon: []  # empty = full frame

  CAM-09:
