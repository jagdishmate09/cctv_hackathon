# CCTV Hackathon - Nginx site config
# Place in /etc/nginx/sites-available/cctv and symlink to sites-enabled

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large video uploads (DAV files can be hundreds of MB)
    client_max_body_size 2G;
    # Give client time to upload large files (default 60s is too short)
    client_body_timeout 900s;
    client_header_timeout 120s;

    root /var/www/cctv;
    index index.html;

    # Frontend SPA: try file, then fallback to index.html (no-cache so users get latest JS)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000";
    }

    # API and auth proxy to backend
    location /api/ {
        client_body_timeout 900s;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        client_max_body_size 2G;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
